<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#9e3d00",
                        "secondary-fixed": "#d3e4fe",
                        "on-tertiary-container": "#fffbff",
                        "secondary-container": "#d0e1fb",
                        "on-primary-container": "#fefcff",
                        "inverse-on-surface": "#eff0fc",
                        "primary-container": "#076df6",
                        "on-secondary": "#ffffff",
                        "primary": "#0056c6",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e1e2ed",
                        "secondary": "#505f76",
                        "inverse-surface": "#2d3039",
                        "on-background": "#191b23",
                        "surface-container-highest": "#e1e2ed",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#d9e2ff",
                        "outline-variant": "#c2c6d7",
                        "on-error": "#ffffff",
                        "on-secondary-fixed-variant": "#38485d",
                        "outline": "#727786",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-secondary-container": "#54647a",
                        "surface-container": "#ecedf9",
                        "surface-container-high": "#e6e7f3",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#d8d9e5",
                        "inverse-primary": "#b0c6ff",
                        "on-surface": "#191b23",
                        "on-secondary-fixed": "#0b1c30",
                        "background": "#faf8ff",
                        "on-tertiary-fixed": "#351000",
                        "on-tertiary-fixed-variant": "#7c2e00",
                        "surface-bright": "#faf8ff",
                        "secondary-fixed-dim": "#b7c8e1",
                        "tertiary-fixed": "#ffdbcc",
                        "on-surface-variant": "#424655",
                        "surface-container-low": "#f2f3ff",
                        "surface": "#faf8ff",
                        "surface-tint": "#0058cb",
                        "on-primary-fixed-variant": "#00429b",
                        "tertiary-container": "#c64f00",
                        "on-tertiary": "#ffffff",
                        "primary-fixed-dim": "#b0c6ff",
                        "on-primary-fixed": "#001945"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin": "24px",
                        "xs": "4px",
                        "xl": "32px",
                        "md": "16px",
                        "unit": "4px",
                        "gutter": "16px",
                        "lg": "24px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "h3": ["Inter"],
                        "h2": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1": ["Inter"],
                        "label-sm": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["18px", {"lineHeight": "1.4", "letterSpacing": "0", "fontWeight": "600"}],
                        "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "h1": ["36px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #F8FAFC;
        }
        .login-card {
            box-shadow: 0 1px 2px 0 rgba(15, 23, 42, 0.05), 0 10px 15px -3px rgba(15, 23, 42, 0.1);
        }
    </style>
</head>
<body class="font-body-md text-on-surface antialiased flex items-center justify-center min-h-screen p-margin">
<!-- Login Shell Suppression: Per instructions, TopAppBar and SideNavBar are suppressed for transactional pages like Login -->
<main class="w-full max-w-md">
<!-- Brand Identity Section -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center p-sm rounded-lg bg-primary-container mb-md">
<span class="material-symbols-outlined text-on-primary-container !text-3xl" data-icon="vital_signs">vital_signs</span>
</div>
<h1 class="font-h1 text-h1 text-on-background tracking-tighter">Vitalis</h1>
<p class="font-body-md text-on-surface-variant mt-xs">Logistics ERP System Control</p>
</div>
<!-- Authentication Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl login-card overflow-hidden">
<div class="p-lg md:p-xl">
<div class="mb-lg">
<h2 class="font-h2 text-h2 text-on-surface">Login</h2>
<p class="font-body-md text-on-surface-variant">Acesse sua conta para gerenciar operações.</p>
</div>
<form class="space-y-gutter" id="loginForm">
<!-- Error State (Hidden by default, can be toggled via JS) -->
<div class="hidden flex items-center gap-sm p-md bg-error-container text-on-error-container rounded-lg border border-error/20" id="errorMessage">
<span class="material-symbols-outlined text-error" data-icon="error">error</span>
<span class="font-label-sm text-label-sm">Credenciais inválidas. Verifique os dados e tente novamente.</span>
</div>
<!-- Username Field -->
<div class="space-y-xs">
<label class="block font-label-sm text-label-sm text-secondary" for="username">Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-md py-3 bg-white border border-outline-variant rounded-lg font-body-md placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="username" name="username" placeholder="Seu nome de usuário" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="block font-label-sm text-label-sm text-secondary" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Esqueceu a senha?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-md py-3 bg-white border border-outline-variant rounded-lg font-body-md placeholder:text-outline focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full flex items-center justify-center gap-sm bg-primary text-on-primary font-h3 text-h3 py-4 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all shadow-sm" type="submit">
                        Entrar
                        <span class="material-symbols-outlined" data-icon="login">login</span>
</button>
</form>
</div>
<!-- Footer Meta -->
<div class="bg-surface-container-low p-md border-t border-outline-variant text-center">
<p class="font-label-sm text-label-sm text-on-secondary-container">
                    © 2024 Vitalis Logistics. All rights reserved.
                </p>
</div>
</div>
<!-- System Status Hint (Optional UI Polish) -->
<div class="mt-lg flex items-center justify-center gap-md">
<div class="flex items-center gap-xs">
<span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">Sistemas Operacionais</span>
</div>
<span class="text-outline text-xs opacity-30">|</span>
<div class="flex items-center gap-xs">
<span class="font-label-sm text-label-sm text-outline uppercase tracking-widest">v2.4.0-build</span>
</div>
</div>
</main>
<script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const errorBanner = document.getElementById('errorMessage');
            
            // Interaction: Show error state hint as requested
            errorBanner.classList.remove('hidden');
            errorBanner.classList.add('animate-bounce');
            
            setTimeout(() => {
                errorBanner.classList.remove('animate-bounce');
            }, 1000);
            
            console.log('Login attempt recorded');
        });

        // Simple focus animation logic for a premium feel
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '#0056c6';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('.material-symbols-outlined').style.color = '';
            });
        });
    </script>
</body></html>
